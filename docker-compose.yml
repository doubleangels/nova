services:
  nova:
    image: ghcr.io/doubleangels/nova:latest
    container_name: nova
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
    read_only: true
    environment:
      - DOPPLER_TOKEN=
      - DASHBOARD_PORT=5015
      - DASHBOARD_BASE_URL=
    ports:
      - "5015:5015"
    volumes:
      - ./data:/app/data:rw,noexec,nosuid
    tmpfs:
      - /tmp