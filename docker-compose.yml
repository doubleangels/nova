services:
  nova:
    image: ghcr.io/doubleangels/nova:latest
    container_name: nova
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    environment:
      - DOPPLER_TOKEN
      - NODE_OPTIONS=--max-old-space-size=192
    mem_limit: 512m
    mem_reservation: 256m
    volumes:
      - ./data:/app/data:rw,noexec,nosuid
    tmpfs:
      - /tmp