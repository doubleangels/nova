name: Development Build Testing

on:
  workflow_dispatch:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  build:
    name: build-and-push-image
    runs-on: ubuntu-latest
    env:
      TRIVY_CACHE_DIR: .trivy-cache
    concurrency:
      group: build-dev
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.6.4

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Cache Trivy vulnerability database
        uses: actions/cache@v6.0.0
        with:
          path: .trivy-cache
          key: ${{ runner.os }}-trivy-db-v4

      - name: Run Trivy vulnerability scanner on repository
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: 'v0.71.0'
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4.36.2
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-fs'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/nova
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=dev-
            type=raw,value=dev,enable={{is_default_branch}}

      - name: Build Docker Image
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=nova-dev
          cache-to: type=gha,mode=max,scope=nova-dev

      - name: Run Trivy vulnerability scanner on container image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: 'v0.71.0'
          image-ref: ${{ steps.build.outputs.imageid }}
          ignore-unfixed: true
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL'
          limit-severities-for-sarif: true
          trivyignores: .trivyignore
          scanners: 'vuln'

      - name: Push Docker image to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while read tag; do
            if [ -n "$tag" ]; then
              docker push "$tag"
            fi
          done

      - name: Upload Trivy image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4.36.2
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'

      - name: Output image info
        if: github.event_name != 'pull_request'
        run: |
          echo "Built and pushed images:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Labels: ${{ steps.meta.outputs.labels }}"

  delete-workflow-runs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 14
          keep_minimum_runs: 10
          delete_workflow_pattern: build-dev-docker
          check_pullrequest_exist: true

  automerge:
    needs: [build]
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - name: Check PR mergeability
        id: check-mergeable
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // GitHub may return null while mergeability is still being computed
            if (pr.mergeable === null) {
              core.setFailed(`PR #${context.issue.number} mergeability not yet computed. Please re-run the workflow in a moment.`);
              return;
            }

            if (pr.mergeable === false) {
              core.setFailed(`PR #${context.issue.number} is not mergeable. State: ${pr.mergeable_state}`);
              return;
            }

            if (pr.mergeable_state === 'dirty' || pr.mergeable_state === 'blocked' || pr.mergeable_state === 'unknown') {
              core.setFailed(`PR #${context.issue.number} cannot be merged. State: ${pr.mergeable_state}`);
              return;
            }

            core.info(`PR #${context.issue.number} is mergeable. State: ${pr.mergeable_state}`);
            core.setOutput('mergeable', 'true');

      - name: Comment on PR
        if: steps.check-mergeable.outputs.mergeable == 'true'
        uses: actions/github-script@v9.0.0
        continue-on-error: true
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Build passed! PR is mergeable. Enabling automerge...'
            });

      - name: Automerge Dependabot PR
        if: steps.check-mergeable.outputs.mergeable == 'true'
        uses: peter-evans/enable-pull-request-automerge@v3.0.0
        continue-on-error: true
        id: automerge
        with:
          token: ${{ github.token }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: merge

      - name: Comment on automerge success
        if: steps.automerge.outcome == 'success'
        uses: actions/github-script@v9.0.0
        continue-on-error: true
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Automerge enabled successfully! This PR will be merged automatically once all checks pass.'
            });

      - name: Comment on automerge failure
        if: steps.automerge.outcome == 'failure'
        uses: actions/github-script@v9.0.0
        continue-on-error: true
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Failed to enable automerge. Please merge this PR manually or check branch protection settings.'
            });

      - name: Fail job when automerge did not succeed
        if: steps.check-mergeable.outputs.mergeable == 'true' && steps.automerge.outcome == 'failure'
        run: exit 1
