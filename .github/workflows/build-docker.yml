name: Build Testing

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: build-and-push-image
    runs-on: ubuntu-latest
    env:
      TRIVY_CACHE_DIR: .trivy-cache
    concurrency:
      group: build-main
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Update npm dependencies
        run: npm update

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Cache Trivy vulnerability database
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .trivy-cache
          key: ${{ runner.os }}-trivy-db-v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ghcr.io/${{ github.repository_owner }}/nova
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=main-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker Image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=nova
          cache-to: type=gha,mode=max,scope=nova

      - name: Run Trivy vulnerability scanner on container image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.build.outputs.imageid }}
          ignore-unfixed: true
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while read tag; do
            if [ -n "$tag" ]; then
              docker push "$tag"
            fi
          done

      - name: Upload Trivy image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'

      - name: Output image info
        if: github.event_name != 'pull_request'
        run: |
          echo "Built and pushed images:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Labels: ${{ steps.meta.outputs.labels }}"

  delete-workflow-runs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@b3018382ca039b53d238908238bd35d1fb14f8ee
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 14
          keep_minimum_runs: 10
          delete_workflow_pattern: build-docker
          check_pullrequest_exist: true

  automerge:
    needs: [build]
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - name: Check PR mergeability
        id: check-mergeable
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // GitHub may return null while mergeability is still being computed
            if (pr.mergeable === null) {
              core.setFailed(`PR #${context.issue.number} mergeability not yet computed. Please re-run the workflow in a moment.`);
              return;
            }

            if (pr.mergeable === false) {
              core.setFailed(`PR #${context.issue.number} is not mergeable. State: ${pr.mergeable_state}`);
              return;
            }

            if (pr.mergeable_state === 'dirty' || pr.mergeable_state === 'blocked' || pr.mergeable_state === 'unknown') {
              core.setFailed(`PR #${context.issue.number} cannot be merged. State: ${pr.mergeable_state}`);
              return;
            }

            core.info(`PR #${context.issue.number} is mergeable. State: ${pr.mergeable_state}`);
            core.setOutput('mergeable', 'true');

      - name: Comment on PR
        if: steps.check-mergeable.outputs.mergeable == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        continue-on-error: true
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Build passed! PR is mergeable. Enabling automerge...'
            });

      - name: Automerge Dependabot PR
        if: steps.check-mergeable.outputs.mergeable == 'true'
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d
        continue-on-error: true
        id: automerge
        with:
          token: ${{ github.token }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: merge

      - name: Comment on automerge success
        if: steps.automerge.outcome == 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        continue-on-error: true
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Automerge enabled successfully! This PR will be merged automatically once all checks pass.'
            });

      - name: Comment on automerge failure
        if: steps.automerge.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        continue-on-error: true
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Failed to enable automerge. Please merge this PR manually or check branch protection settings.'
            });

      - name: Fail job when automerge did not succeed
        if: steps.check-mergeable.outputs.mergeable == 'true' && steps.automerge.outcome == 'failure'
        run: exit 1
